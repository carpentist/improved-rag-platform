spring:
  application:
    name: ImprovedRAGPlatform
  profiles:
    active: local
langchain4j:
  chat-model:
    model-name: qwen-plus
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: your-api-key-here
  embedding-model:
    model-name: text-embedding-v4
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: your-api-key-here
    dimension: 1024

milvus:
  host: your-host
  port: 19530
# ------ Advanced RAG 自定义配置 ------
rag:
  ingestion:
    default-strategy: recursive
    recursive-max-chars: 500
    recursive-overlap: 100
    paragraph-max-chars: 500
    paragraph-overlap: 100
    sentence-max-chars: 300
    sentence-overlap: 50
  retrieval:
    max-results: 5
    min-score: 0.7